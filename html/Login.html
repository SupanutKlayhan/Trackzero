<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Zero - Login</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Jersey+15&family=Jersey+25&display=swap" rel="stylesheet">
  
</head>
<body>
  
  <div class="container">
    
    <header class="top-header">
      <a href="/"><img src="https://github.com/SupanutKlayhan/Trackzero/blob/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/Track%20Zero%20Logo%202.png?raw=true" alt="Logo" width="82"></a>
      <h1 class="font-jersey25">TRACK <span>ZERO</span></h1>
    </header>

    <nav class="main-nav" data-nav-root>
      <button class="nav-toggle font-jersey15" type="button" aria-expanded="false" aria-controls="site-nav-content">
        MENU
      </button>
      <div class="nav-content" id="site-nav-content">
        <ul class="font-jersey15">
          <li><a href="#">All Products</a></li>
          <li><a href="#">CD</a></li>
          <li><a href="#">Vinyl</a></li>
          <li><a href="#">Cassette</a></li>
          <li><a href="#">Digital Albums</a></li>
        </ul>
        <div class="nav-icons">
          <a href="/search"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/search.svg" alt="Search"></a>
          <a href="/login"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/login.svg" alt="Login"></a>
          <a href="/team"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/groups.svg" alt="Team"></a>
        </div>
      </div>
    </nav>

    <section class="login-section">
      <form class="login-card" id="login-form">
        <img src="https://github.com/SupanutKlayhan/Trackzero/blob/main/element/Track%20Zero%20Logo.png?raw=true" alt="User Avatar" class="avatar">
        
        <h2 class="font-jersey25">Login</h2>
        
        <div class="form-group">
          <label>Username</label>
          <input id="username" name="username" type="text" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required>
        </div>
        
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        
        <button type="submit" class="login-btn font-jersey25">Login</button>
        <p id="login-message" style="margin-top: 12px; font-size: 14px;"></p>
      </form>
    </section>

    <footer class="footer">
      <h5 class="font-jersey25">Contact us</h5>
      <ul class="font-jersey25">
        <li>Email</li>
        <li>Telephone</li>
        <li>Our team members</li>
      </ul>
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const API_BASE = window.TRACKZERO_API_BASE || 'http://localhost:3300';
      const loginForm = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const rememberInput = document.getElementById('remember');
      const messageElement = document.getElementById('login-message');

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        messageElement.textContent = 'Checking credentials...';
        messageElement.style.color = '#333';

        try {
          const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              username: usernameInput.value,
              password: passwordInput.value,
              rememberMe: rememberInput.checked
            })
          });

          const data = await response.json();

          if (!response.ok) {
            messageElement.textContent = data.message || 'Login failed.';
            messageElement.style.color = '#b00020';
            return;
          }

          if (data.token) {
            localStorage.setItem('trackzeroAdminToken', data.token);
          }

          messageElement.textContent = 'Login successful. Redirecting...';
          messageElement.style.color = '#0a7d2a';
          window.location.href = '/Manage-Products';
        } catch (error) {
          messageElement.textContent = 'Cannot connect to server. Please try again.';
          messageElement.style.color = '#b00020';
        }
      });
    });
  </script>
</body>
</html>
