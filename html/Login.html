<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Zero - Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Jersey+15&family=Jersey+25&display=swap" rel="stylesheet">
  
</head>
<body>
  
  <div class="container">
    
    <header class="top-header">
      <a href="/"><img src="/element/Track Zero Logo 2.png" alt="Logo" width="82"></a>
      <h1 class="font-jersey25">TRACK <span>ZERO</span></h1>
    </header>

    <nav class="main-nav">
      <ul class="font-jersey15">
        <li><a href="#">All Products</a></li>
        <li><a href="#">CD</a></li>
        <li><a href="#">Vinyl</a></li>
        <li><a href="#">Cassette</a></li>
        <li><a href="#">Digital Albums</a></li>
      </ul>
      <div class="nav-icons">
        <a href="/html/Search.html"><img src="./track zero (Copy) - Login_files/9a07dec46482f6bab7bfc1ba7bc70c485402c266.svg" alt="Search"></a>
        <a href="/login"><img src="./track zero (Copy) - Login_files/89d8073d5add420ff159f5db055c85818e8ea13d.svg" alt="Login"></a>
        <a href="/team"><img src="./track zero (Copy) - Login_files/e526a928e61a7ad4d09fe6e08a9072ddbbcfb02a.svg" alt="Team"></a>
      </div>
    </nav>

    <section class="login-section">
      <form class="login-card" action="/productservice-management">
        <img src="/element/Track Zero Logo.png" alt="User Avatar" class="avatar">
        
        <h2 class="font-jersey25">Login</h2>
        
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter username" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password" required>
        </div>
        
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        
        <button type="submit" class="login-btn font-jersey25">Login</button>
      </form>
    </section>

    <footer class="footer">
      <h5 class="font-jersey25">Contact us</h5>
      <ul class="font-jersey25">
        <li>Email</li>
        <li>Telephone</li>
        <li>Our team members</li>
      </ul>
    </footer>

  </div>
</body>
</html>
