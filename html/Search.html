<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Zero - Search</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Jersey+15&family=Jersey+25&display=swap" rel="stylesheet">
  
</head>
<body>
  
  <div class="container">
    
    <header class="top-header">
      <a href="/"><img src="https://github.com/SupanutKlayhan/Trackzero/blob/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/Track%20Zero%20Logo%202.png?raw=true" alt="Logo" width="82"></a>
      <h1 class="font-jersey25">TRACK <span>ZERO</span></h1>
    </header>

    <nav class="main-nav" data-nav-root>
      <button class="nav-toggle font-jersey15" type="button" aria-expanded="false" aria-controls="site-nav-content">
        MENU
      </button>
      <div class="nav-content" id="site-nav-content">
        <ul class="font-jersey15">
          <li><a href="#">All Products</a></li>
          <li><a href="#">CD</a></li>
          <li><a href="#">Vinyl</a></li>
          <li><a href="#">Cassette</a></li>
          <li><a href="#">Digital Albums</a></li>
        </ul>
        <div class="nav-icons">
          <a href="/search"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/search.svg" alt="Search"></a>
          <a href="/login"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/login.svg" alt="Login"></a>
          <a href="/team"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/groups.svg" alt="Team"></a>
        </div>
      </div>
    </nav>

    <section class="search-panel">
      <div class="search-row">
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="search-name" placeholder="Search albums...">
        </div>
        <div class="input-group">
          <label>Genre</label>
          <select id="filter-genre">
            <option value="all">All</option>
          </select>
        </div>
        <div class="input-group">
          <label>Artist</label>
          <select id="filter-artist">
            <option value="all">All</option>
          </select>
        </div>
        <div class="input-group">
          <label>Year</label>
          <select id="filter-year">
            <option value="all">All</option>
          </select>
        </div>
      </div>
      
      <div class="search-row search-row-controls">
        <div class="format-toggles">
          <label class="format-label">Format:</label>
          <span class="toggle active" data-format="all">All</span>
          <span class="toggle" data-format="CD">CD</span>
          <span class="toggle" data-format="Cassette">Cassette</span>
          <span class="toggle" data-format="Vinyl">Vinyl</span>
          <span class="toggle" data-format="Digital Albums">Digital Albums</span>
        </div>
        <div class="search-actions">
          <button id="btn-clear" type="button" class="btn-clear font-jersey15">CLEAR</button>
          <button id="btn-search" type="button" class="btn-search font-jersey15">SEARCH</button>
        </div>
      </div>
    </section>

    <div class="marquee">
      <p>Search Result: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Search Result: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Search Result:</p>
    </div>

    <section class="results-grid" id="results-grid">
    </section>

    <p id="search-message" style="margin: 16px 0 0; text-align: center;"></p>

    <footer class="footer">
      <h5 class="font-jersey25">Contact us</h5>
      <ul class="font-jersey25">
        <li>Email</li>
        <li>Telephone</li>
        <li>Our team members</li>
      </ul>
    </footer>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const API_BASE = window.TRACKZERO_API_BASE || 'http://localhost:3300';
        const nameInput = document.getElementById('search-name');
        const genreSelect = document.getElementById('filter-genre');
        const artistSelect = document.getElementById('filter-artist');
        const yearSelect = document.getElementById('filter-year');
        const searchButton = document.getElementById('btn-search');
        const clearButton = document.getElementById('btn-clear');
        const resultsGrid = document.getElementById('results-grid');
        const messageElement = document.getElementById('search-message');
        const formatToggles = document.querySelectorAll('.toggle');

        let activeFormat = 'all';

        const setMessage = (text, color) => {
          messageElement.textContent = text;
          messageElement.style.color = color;
        };

        const fillSelectWithValues = (selectElement, values) => {
          while (selectElement.options.length > 1) {
            selectElement.remove(1);
          }

          values.forEach((value) => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            selectElement.appendChild(option);
          });
        };

        const renderProducts = (products) => {
          resultsGrid.innerHTML = '';

          if (products.length === 0) {
            setMessage('No products found.', '#b00020');
            return;
          }

          setMessage(`Found ${products.length} result(s).`, '#0a7d2a');

          products.forEach((product) => {
            const card = document.createElement('div');
            card.className = 'card';

            const description = product.description || 'No description available.';
            const imageUrl = product.imageUrl || 'https://via.placeholder.com/600x400?text=Track+Zero';

            card.innerHTML = `
              <img src="${imageUrl}" alt="${product.name}">
              <h5>${product.name}</h5>
              <p>${description}</p>
              <p><strong>${product.artist}</strong> • ${product.genre} • ${product.format} • ${product.year}</p>
              <a class="cta" href="/Detail?id=${product.id}">View details →</a>
            `;

            resultsGrid.appendChild(card);
          });
        };

        const performSearch = async () => {
          const params = new URLSearchParams();

          if (nameInput.value.trim()) {
            params.append('name', nameInput.value.trim());
          }
          if (genreSelect.value !== 'all') {
            params.append('genre', genreSelect.value);
          }
          if (artistSelect.value !== 'all') {
            params.append('artist', artistSelect.value);
          }
          if (yearSelect.value !== 'all') {
            params.append('year', yearSelect.value);
          }
          if (activeFormat !== 'all') {
            params.append('format', activeFormat);
          }

          const url = params.toString()
            ? `${API_BASE}/api/products?${params.toString()}`
            : `${API_BASE}/api/products`;
          setMessage('Loading products...', '#333');

          try {
            const response = await fetch(url);
            const data = await response.json();

            if (!response.ok) {
              setMessage(data.message || 'Search request failed.', '#b00020');
              return;
            }

            renderProducts(data.data || []);
          } catch (error) {
            setMessage('Cannot connect to server. Please try again.', '#b00020');
          }
        };

        const loadFilterOptions = async () => {
          try {
            const response = await fetch(`${API_BASE}/api/products`);
            const data = await response.json();

            if (!response.ok) {
              return;
            }

            const products = data.data || [];
            const genres = [...new Set(products.map((product) => product.genre))].sort();
            const artists = [...new Set(products.map((product) => product.artist))].sort();
            const years = [...new Set(products.map((product) => String(product.year)))].sort((a, b) => Number(b) - Number(a));

            fillSelectWithValues(genreSelect, genres);
            fillSelectWithValues(artistSelect, artists);
            fillSelectWithValues(yearSelect, years);
          } catch (error) {
            setMessage('Could not load filter options from server.', '#b00020');
          }
        };

        formatToggles.forEach((toggle) => {
          toggle.addEventListener('click', () => {
            formatToggles.forEach((item) => item.classList.remove('active'));
            toggle.classList.add('active');
            activeFormat = toggle.dataset.format;
          });
        });

        searchButton.addEventListener('click', performSearch);

        clearButton.addEventListener('click', () => {
          nameInput.value = '';
          genreSelect.value = 'all';
          artistSelect.value = 'all';
          yearSelect.value = 'all';
          activeFormat = 'all';
          formatToggles.forEach((item) => item.classList.remove('active'));
          if (formatToggles[0]) {
            formatToggles[0].classList.add('active');
          }
          performSearch();
        });

        loadFilterOptions().then(performSearch);
      });
    </script>

  </div>
</body>
</html>
