<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Zero - Detail (Admin View)</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Jersey+15&family=Jersey+25&display=swap" rel="stylesheet">
  
 
</head>
<body>
  
  <div class="container">
    
    <header class="top-header">
      <a href="/"><img src="/element/Track Zero Logo 2.png" alt="Logo" width="82"></a>
      <h1 class="font-jersey25">TRACK <span>ZERO</span></h1>
    </header>

    <nav class="main-nav">
      <ul class="font-jersey15">
        <li><a href="#">All Products</a></li>
        <li><a href="#">CD</a></li>
        <li><a href="#">Vinyl</a></li>
        <li><a href="#">Cassette</a></li>
        <li><a href="#">Digital Albums</a></li>
      </ul>
      <div class="nav-icons">
        <a href="/search"><img src="/element/search.svg" alt="Search"></a>
        <a href="#"><img src="/element/login.svg" alt="Login"></a>
        <a href="/productservice-management"><img src="/element/groups.svg" alt="Team"></a>
      </div>
    </nav>

    <section class="product-detail">
      <div class="detail-info">
        <h2>Product name</h2>
        <ul class="meta-list">
          <li>artist</li>
          <li>genre</li>
          <li>format</li>
          <li>year</li>
        </ul>
        <div class="detail-actions">
          <button class="btn">Buy now</button>
          <button class="btn btn-outline">Remind me later</button>
          <button class="btn btn-edit">Edit</button>
        </div>
      </div>
      <img class="main-product-img" src="./track zero (Copy) - Detail adminview_files/32154abcf44e5fcd46c60a4e9e198eeeef9e9086.png" alt="Product Image">
    </section>

    <section class="track-list-section">
      <div class="track-info">
        <h3>Track list</h3>
        <ul class="tracks">
          <li>track 1</li>
          <li>track 2</li>
          <li>track 3</li>
          <li>track 4</li>
        </ul>
      </div>
      <img class="track-img" src="./track zero (Copy) - Detail adminview_files/61ef12e5bf50c0309ce3bfbb6331a4fcb7f6a42f.png" alt="Track Illustration">
    </section>

    <footer class="footer">
      <h5 class="font-jersey25">Contact us</h5>
      <ul class="font-jersey25">
        <li>Email</li>
        <li>Telephone</li>
        <li>Our team members</li>
      </ul>
    </footer>

  </div>
</body>
</html>
