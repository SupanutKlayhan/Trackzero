<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Zero - Detail</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Jersey+15&family=Jersey+25&display=swap" rel="stylesheet">
  
</head>
<body>
  
  <div class="container">
    
   <header class="top-header">
      <a href="/"><img src="https://github.com/SupanutKlayhan/Trackzero/blob/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/Track%20Zero%20Logo%202.png?raw=true" alt="Logo" width="82"></a>
      <h1 class="font-jersey25">TRACK <span>ZERO</span></h1>
    </header>

    <nav class="main-nav" data-nav-root>
      <button class="nav-toggle font-jersey15" type="button" aria-expanded="false" aria-controls="site-nav-content">
        MENU
      </button>
      <div class="nav-content" id="site-nav-content">
        <ul class="font-jersey15">
          <li><a href="#">All Products</a></li>
          <li><a href="#">CD</a></li>
          <li><a href="#">Vinyl</a></li>
          <li><a href="#">Cassette</a></li>
          <li><a href="#">Digital Albums</a></li>
        </ul>
        <div class="nav-icons">
          <a href="/search"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/search.svg" alt="Search"></a>
          <a href="/login"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/login.svg" alt="Login"></a>
          <a href="/team"><img src="https://raw.githubusercontent.com/SupanutKlayhan/Trackzero/1c6ed1ecb49ad9a8818ad9dcbf260e382d5867a5/element/groups.svg" alt="Team"></a>
        </div>
      </div>
    </nav>

    <section class="product-detail">
      <div class="detail-info">
        <h2 id="detail-name">Loading...</h2>
        <ul class="meta-list">
          <li id="detail-artist">Artist: -</li>
          <li id="detail-genre">Genre: -</li>
          <li id="detail-format">Format: -</li>
          <li id="detail-year">Year: -</li>
        </ul>
        <div class="detail-actions">
          <button class="btn">Buy now</button>
          <button class="btn btn-outline">Remind me later</button>
        </div>
      </div>
      <img id="detail-image" class="main-product-img" src="https://via.placeholder.com/600x400?text=Track+Zero" alt="Product Image">
    </section>

    <p id="detail-message" style="text-align: center; margin: 8px 0;"></p>

    <section class="track-list-section">
      <div class="track-info">
        <h3>Track list</h3>
        <ul class="tracks" id="track-list">
          <li>Loading tracks...</li>
        </ul>
      </div>
      <img class="track-img" src="./track zero (Copy) - Detail_files/61ef12e5bf50c0309ce3bfbb6331a4fcb7f6a42f.png" alt="Track Illustration">
    </section>

    <footer class="footer">
      <h5 class="font-jersey25">Contact us</h5>
      <ul class="font-jersey25">
        <li>Email</li>
        <li>Telephone</li>
        <li>Our team members</li>
      </ul>
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const API_BASE = window.TRACKZERO_API_BASE || 'http://localhost:3300';
      const nameElement = document.getElementById('detail-name');
      const artistElement = document.getElementById('detail-artist');
      const genreElement = document.getElementById('detail-genre');
      const formatElement = document.getElementById('detail-format');
      const yearElement = document.getElementById('detail-year');
      const imageElement = document.getElementById('detail-image');
      const trackListElement = document.getElementById('track-list');
      const messageElement = document.getElementById('detail-message');

      const setMessage = (text, color) => {
        messageElement.textContent = text;
        messageElement.style.color = color;
      };

      const renderProduct = (product) => {
        nameElement.textContent = product.name;
        artistElement.textContent = `Artist: ${product.artist}`;
        genreElement.textContent = `Genre: ${product.genre}`;
        formatElement.textContent = `Format: ${product.format}`;
        yearElement.textContent = `Year: ${product.year}`;
        imageElement.src = product.imageUrl || 'https://via.placeholder.com/600x400?text=Track+Zero';

        trackListElement.innerHTML = '';
        const tracks = Array.isArray(product.trackList) ? product.trackList : [];
        if (tracks.length === 0) {
          trackListElement.innerHTML = '<li>No tracks listed.</li>';
        } else {
          tracks.forEach((track) => {
            const item = document.createElement('li');
            item.textContent = track;
            trackListElement.appendChild(item);
          });
        }

        setMessage('Product details loaded.', '#0a7d2a');
      };

      const loadProduct = async () => {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        setMessage('Loading product details...', '#333');

        try {
          let response;
          let data;

          if (productId) {
            response = await fetch(`${API_BASE}/api/products/${productId}`);
            data = await response.json();

            if (!response.ok) {
              setMessage(data.message || 'Could not load product.', '#b00020');
              return;
            }

            renderProduct(data.data);
            return;
          }

          response = await fetch(`${API_BASE}/api/products`);
          data = await response.json();

          if (!response.ok || !data.data || data.data.length === 0) {
            setMessage('No products available.', '#b00020');
            return;
          }

          renderProduct(data.data[0]);
        } catch (error) {
          setMessage('Cannot connect to server. Please try again.', '#b00020');
        }
      };

      loadProduct();
    });
  </script>
</body>
</html>
